<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tickets</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { outfit: ['Outfit','sans-serif'], mono: ['JetBrains Mono','monospace'] },
          colors: {
            bg:'#0f0f14', surface:'#16161f', surface2:'#1e1e2e',
            purple:'#a855f7', purpled:'#7c3aed', yellow:'#facc15',
            green:'#4ade80', red:'#f87171', muted:'#64748b',
          },
          animation: { pulse2:'pulse2 1.2s infinite', slideUp:'slideUp 0.4s ease both' },
          keyframes: {
            pulse2:  { '0%,100%':{opacity:'1'}, '50%':{opacity:'0.4'} },
            slideUp: { from:{opacity:'0',transform:'translateY(16px)'}, to:{opacity:'1',transform:'translateY(0)'} },
          },
        }
      }
    }
  </script>
  <link rel="stylesheet" href="../css/theme.css">
  <style>
    .modal-backdrop { backdrop-filter: blur(4px); }
  </style>
</head>

<body class="bg-bg text-slate-200 min-h-screen overflow-x-hidden">
<div class="relative z-10 max-w-6xl mx-auto px-6 py-8 pb-16">

  <!-- HEADER -->
  <div class="flex items-center justify-center mb-8 pb-6 border-b border-purple/15">
    <div class="text-center">
      <h1 class="text-2xl font-extrabold text-purple tracking-tight">🎫 Tickets</h1>
      <p class="mono text-muted text-xs mt-1">Active incident tracker</p>
    </div>
  </div>

  <!-- TICKET GRID — 2 columns -->
  <div id="ticketList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <!-- Skeleton cards -->
    <div class="bg-surface border border-purple/15 rounded-2xl p-5 animate-pulse">
      <div class="h-4 bg-surface2 rounded w-1/3 mb-4"></div>
      <div class="h-3 bg-surface2 rounded w-3/4 mb-2"></div>
      <div class="h-3 bg-surface2 rounded w-1/2 mb-2"></div>
      <div class="h-3 bg-surface2 rounded w-2/3"></div>
    </div>
    <div class="bg-surface border border-purple/15 rounded-2xl p-5 animate-pulse">
      <div class="h-4 bg-surface2 rounded w-2/5 mb-4"></div>
      <div class="h-3 bg-surface2 rounded w-3/4 mb-2"></div>
      <div class="h-3 bg-surface2 rounded w-1/2 mb-2"></div>
      <div class="h-3 bg-surface2 rounded w-2/3"></div>
    </div>
  </div>

</div>

<script src="../js/api.js"></script>
<script src="../js/tickets.js"></script>
</body>
</html>
